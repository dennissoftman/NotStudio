# Local infra for the Radio Dashboard.
#   docker compose up -d redis                 # required (arq queue)
#   docker compose --profile icecast up -d     # optional Icecast server (feature #3)
services:
  redis:
    container_name: radio-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    # Persist the arq queue (AOF) so queued / in-flight jobs survive a restart.
    command: [ "redis-server", "--appendonly", "yes", "--dir", "/data" ]
    volumes:
      - radio-redis-data:/data

  # Optional Icecast server. Start with:  docker compose --profile icecast up -d icecast
  #
  # Icecast is a SEPARATE HTTP server from the FastAPI app — they can't share a
  # port. The API owns :8000, so Icecast is published on host :8010 (mapped to the
  # container's built-in :8000). The backend (on the host) pushes to
  # localhost:8010 and listeners tune in at http://localhost:8010/<mount>.
  #
  # No icecast.xml mount is needed: the image's entrypoint patches /etc/icecast.xml
  # from the ICECAST_* env vars below (via its `xml-edit` helper). Mount your own
  # config only for advanced control (custom listen port, extra mounts, limits,
  # per-mount auth) — env vars can't change the listen port.
  icecast:
    container_name: radio-icecast
    image: libretime/icecast:2.5.0
    ports:
      - "8010:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: hackme
      ICECAST_ADMIN_PASSWORD: hackme
      ICECAST_RELAY_PASSWORD: hackme
      ICECAST_ADMIN_USERNAME: admin
      ICECAST_ADMIN_EMAIL: admin@localhost
      ICECAST_LOCATION: Earth
      ICECAST_HOSTNAME: localhost
    volumes:
      - radio-icecast-logs:/var/log/icecast   # persist access.log (error log -> docker logs)
    #   - ./icecast.xml:/etc/icecast.xml:ro    # advanced: full config control
    profiles: [ "icecast" ]

volumes:
  radio-redis-data:      # arq queue: jobs, results, abort flags
  radio-icecast-logs:    # icecast access logs

# The API + worker run on the host (via uv), so the app's own persistent data —
# the SQLite DB, generated audio, and HLS segments — lives on the host under
# radio-dashboard/api/data/ (set RADIO_DATA_DIR to relocate). No container volume
# is needed for it unless you containerize the API/worker (then mount /app/data).
